<!DOCTYPE html>
<html>
<head>
    <title>RITESH GENIUS - Education AI</title>
    <style>
        body { background: #0f172a; color: white; font-family: Arial; padding: 20px; }
        input, button { padding: 10px; font-size: 16px; }
        #answer { margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🎓 RITESH GENIUS - Ask Anything</h1>
    <input id="q" placeholder="Apna sawal likho..." style="width: 70%;">
    <button onclick="ask()">Ask</button>
    <div id="answer"></div>

    <script>
        async function ask() {
            const question = document.getElementById('q').value;
            document.getElementById('answer').innerText = 'Socha jaa raha hai...';
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            document.getElementById('answer').innerText = data.reply;
        }
    </script>
</body>
</html>
